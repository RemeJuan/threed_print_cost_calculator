workflows:
  android_release:
    name: Android Shorebird Release
    max_build_duration: 90
    instance_type: linux_x2
    environment:
      flutter: fvm
      android_signing:
        - android_keystore
      groups:
        - google_play_credentials # GCLOUD_SERVICE_ACCOUNT_CREDENTIALS for Play publishing.
      vars:
        FLUTTER_VERSION: 3.41.6 # Matches .fvmrc; update if the app moves Flutter versions.
    cache:
      cache_paths:
        - $HOME/.pub-cache
        - $HOME/.gradle/caches
        - $HOME/.gradle/wrapper
        - $HOME/.android/build-cache
    scripts:
      - name: Install FVM and Shorebird
        script: |
          export PATH="$PATH:$HOME/.pub-cache/bin"
          dart pub global activate fvm
          curl --proto '=https' --tlsv1.2 https://raw.githubusercontent.com/shorebirdtech/install/main/install.sh -sSf | bash
          echo 'PATH="$HOME/.shorebird/bin:$PATH"' >> $CM_ENV
      - name: Fetch Flutter dependencies
        script: |
          export PATH="$PATH:$HOME/.pub-cache/bin"
          fvm install
          fvm flutter pub get
      - name: Export build number
        script: |
          APP_VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d+ -f1)
          echo "FLUTTER_BUILD_NAME=$APP_VERSION" >> $CM_ENV
          echo "FLUTTER_BUILD_NUMBER=$PROJECT_BUILD_NUMBER" >> $CM_ENV
      - name: Shorebird release for Android
        script: |
          export PATH="$PATH:$HOME/.pub-cache/bin"
          shorebird release android --flutter-version="$FLUTTER_VERSION"
    artifacts:
      - build/**/outputs/**/*.aab
      - build/**/outputs/**/*.apk
      - build/**/outputs/**/mapping.txt
    publishing:
      email:
        recipients:
          - mail@remej.dev
        notify:
          success: true
          failure: true
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: beta
      scripts:
        - name: Post-build webhook
          script: |
            curl https://maker.ifttt.com/trigger/3DPC/with/key/c6rzE4KYQuJ1LJEP9ImUvq

  ios_release:
    name: iOS Shorebird Release
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      flutter: fvm
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.threed-print-calculator
      groups:
        - app_store_credentials # APP_STORE_CONNECT_ISSUER_ID, APP_STORE_CONNECT_KEY_IDENTIFIER, APP_STORE_CONNECT_PRIVATE_KEY.
      vars:
        FLUTTER_VERSION: 3.41.6 # Matches .fvmrc; update if the app moves Flutter versions.
        BUNDLE_ID: com.threed-print-calculator
    cache:
      cache_paths:
        - $HOME/.pub-cache
        - $HOME/Library/Caches/CocoaPods
        - $HOME/Library/Developer/Xcode/DerivedData
    scripts:
      - name: Install FVM and Shorebird
        script: |
          export PATH="$PATH:$HOME/.pub-cache/bin"
          dart pub global activate fvm
          curl --proto '=https' --tlsv1.2 https://raw.githubusercontent.com/shorebirdtech/install/main/install.sh -sSf | bash
          echo 'PATH="$HOME/.shorebird/bin:$PATH"' >> $CM_ENV
      - name: Fetch Flutter dependencies
        script: |
          export PATH="$PATH:$HOME/.pub-cache/bin"
          fvm install
          fvm flutter pub get
      - name: Export build number
        script: |
          APP_VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d+ -f1)
          echo "FLUTTER_BUILD_NAME=$APP_VERSION" >> $CM_ENV
          echo "FLUTTER_BUILD_NUMBER=$PROJECT_BUILD_NUMBER" >> $CM_ENV
      - name: Configure Xcode export options
        script: |
          export PATH="$PATH:$HOME/.pub-cache/bin"
          # Keep version/build-number handling in Codemagic rather than Xcode.
          xcode-project use-profiles --custom-export-options={\"manageAppVersionAndBuildNumber\":false}
      - name: Shorebird release for iOS
        script: |
          export PATH="$PATH:$HOME/.pub-cache/bin"
          shorebird release ios \
            --flutter-version="$FLUTTER_VERSION" \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - mail@remej.dev
        notify:
          success: true
          failure: true
      app_store_connect:
        api_key:
          key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
          issuer_id: $APP_STORE_CONNECT_ISSUER_ID
          private_key: $APP_STORE_CONNECT_PRIVATE_KEY
        submit_to_testflight: true
      scripts:
        - name: Post-build webhook
          script: |
            curl https://maker.ifttt.com/trigger/3DPC/with/key/c6rzE4KYQuJ1LJEP9ImUvq

  android_patch:
    name: Android Shorebird Patch
    max_build_duration: 90
    instance_type: linux_x2
    inputs:
      release_version:
        description: Shorebird release version to patch (use latest to patch the newest release)
        default: latest
    environment:
      flutter: fvm
      android_signing:
        - android_keystore
      groups:
        - google_play_credentials # GCLOUD_SERVICE_ACCOUNT_CREDENTIALS for Play publishing.
    cache:
      cache_paths:
        - $HOME/.pub-cache
        - $HOME/.gradle/caches
        - $HOME/.gradle/wrapper
        - $HOME/.android/build-cache
    scripts:
      - name: Install FVM and Shorebird
        script: |
          export PATH="$PATH:$HOME/.pub-cache/bin"
          dart pub global activate fvm
          curl --proto '=https' --tlsv1.2 https://raw.githubusercontent.com/shorebirdtech/install/main/install.sh -sSf | bash
          echo 'PATH="$HOME/.shorebird/bin:$PATH"' >> $CM_ENV
      - name: Fetch Flutter dependencies
        script: |
          export PATH="$PATH:$HOME/.pub-cache/bin"
          fvm install
          fvm flutter pub get
      - name: Export build number
        script: |
          APP_VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d+ -f1)
          echo "FLUTTER_BUILD_NAME=$APP_VERSION" >> $CM_ENV
          echo "FLUTTER_BUILD_NUMBER=$PROJECT_BUILD_NUMBER" >> $CM_ENV
      - name: Shorebird patch for Android
        script: |
          export PATH="$PATH:$HOME/.pub-cache/bin"
          shorebird patch android --release-version=${{ inputs.release_version }}
    artifacts:
      - build/**/outputs/**/*.aab
      - build/**/outputs/**/*.apk
      - build/**/outputs/**/mapping.txt
    publishing:
      email:
        recipients:
          - mail@remej.dev
        notify:
          success: true
          failure: true

