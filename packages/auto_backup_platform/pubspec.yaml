name: auto_backup_platform
description: Native destination access for scheduled backups.
version: 0.0.1
publish_to: none

environment:
  sdk: ^3.0.0
  flutter: ">=3.13.0"

dependencies:
  flutter:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: com.threedprintcostcalculator.auto_backup_platform
        pluginClass: AutoBackupPlatformPlugin
      ios:
        pluginClass: AutoBackupPlatformPlugin
