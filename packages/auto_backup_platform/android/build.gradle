group 'com.threedprintcostcalculator.auto_backup_platform'
version '1.0'

buildscript {
  ext.kotlin_version = '1.9.22'
  repositories { google(); mavenCentral() }
  dependencies { classpath 'com.android.tools.build:gradle:8.2.2'; classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version" }
}

allprojects { repositories { google(); mavenCentral() } }

apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'

android {
  namespace 'com.threedprintcostcalculator.auto_backup_platform'
  compileSdkVersion 34
  defaultConfig { minSdkVersion 21 }
  compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }
  kotlinOptions { jvmTarget = '17' }
}

dependencies {
  implementation "org.jetbrains.kotlin:kotlin-stdlib:$kotlin_version"
  implementation 'androidx.documentfile:documentfile:1.0.1'
}
