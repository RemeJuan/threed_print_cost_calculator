name: threed_print_cost_calculator
description: A simple 3D Print cost calculator.
version: 3.1.0+5
publish_to: none

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  bloc: ^9.2.1
  bot_toast: 4.1.3
  cider: 0.2.10
  equatable: 2.0.8
  firebase_analytics: ^12.4.3
  firebase_app_check: ^0.4.5
  firebase_core: ^4.11.0
  firebase_crashlytics: ^5.2.4
  file_selector: 1.1.0
  flutter:
    sdk: flutter
  formz: 0.8.0
  flutter_hooks: 0.21.3+1
  freezed_annotation: 3.1.0
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: 3.3.2
  flutter_slidable: 4.0.3
  hooks_riverpod: 3.3.2
  intl: 0.20.2
  package_info_plus: ^10.1.0
  path:
  path_provider: ^2.1.6
  platform_info: 5.0.0
  purchases_flutter: ^10.3.0
  purchases_ui_flutter: ^10.3.0
  rate_my_app: ^2.4.0
  riverpod: 3.3.2
  sembast: 3.8.9
  shared_preferences: 2.5.5
  share_plus: 13.1.0
  flutter_email_sender: ^10.0.1
  url_launcher: 6.3.2
  shorebird_code_push: 2.0.6
  update_available: 3.2.1
  hugeicons: 1.1.7
  excel: ^4.0.6
  flutter_secure_storage: 10.3.1
  workmanager: ^0.9.0+3
  auto_backup_platform:
    path: packages/auto_backup_platform

dev_dependencies:
  bloc_test: 10.0.0
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  mocktail: 1.0.5
  flutter_lints: 6.0.0
  husky: 0.1.7
  build_runner: 2.15.0
  freezed: 3.2.5
  flutter_launcher_icons: ^0.14.4
  patrol: 4.6.1
  shared_preferences_platform_interface:

dependency_overrides:
  intl: 0.20.2
  package_info_plus: 10.1.0

flutter:
  config:
    enable-swift-package-manager: false
  uses-material-design: true
  generate: true
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/inter/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/inter/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/inter/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/inter/Inter-Bold.ttf
          weight: 700
  assets:
    - shorebird.yaml
    - assets/test_data/settings.json
    - assets/test_data/free/
    - assets/test_data/premium/
    - assets/whats_new.json

cider:
  link_template:
    tag: https://github.com/RemeJuan/threed_print_cost_calculator/releases/tag/%tag% # initial release link template
    diff: https://github.com/RemeJuan/threed_print_cost_calculator/compare/%from%...%to% # subsequent releases link template

patrol:
  app_name: 3D Print Cost Calculator
  android:
    package_name: com.threed_print_calculator
  ios:
    bundle_id: com.threed-print-calculator

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    background_color: "#ffffff"
    theme_color: "#ffffff"
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/icons/app_icon.png"
  adaptive_icon_monochrome: "assets/icons/app_icon_monochrome.png"
  remove_alpha_ios: true
  background_color_ios: "#ffffff"
  min_sdk_android: 21
