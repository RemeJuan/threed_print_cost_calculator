name: threed_print_cost_calculator
description: A simple 3D Print cost calculator.
version: 2.7.0+3
publish_to: none

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  bloc: 9.2.0
  bot_toast: 4.1.3
  cider: 0.2.10
  device_check: 1.0.0
  equatable: 2.0.8
  firebase_analytics: 12.2.0
  firebase_app_check: 0.4.2
  firebase_core: 4.6.0
  firebase_crashlytics: 5.1.0
  flutter:
    sdk: flutter
  formz: 0.8.0
  flutter_hooks: 0.21.3+1
  freezed_annotation: 3.1.0
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: 3.3.1
  flutter_slidable: 4.0.3
  hooks_riverpod: 3.3.1
  intl: 0.20.2
  package_info_plus: 9.0.1
  path:
  path_provider: 2.1.5
  platform_info: 5.0.0
  purchases_flutter: 9.16.0
  purchases_ui_flutter: 9.16.0
  rate_my_app: 2.3.2
  riverpod: 3.2.1
  sembast: 3.8.6
  shared_preferences: 2.5.5
  share_plus: 12.0.2
  url_launcher: 6.3.2
  shorebird_code_push: 2.0.5

dev_dependencies:
  bloc_test: 10.0.0
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  mocktail: 1.0.4
  flutter_lints: 6.0.0
  build_runner: 2.10.4
  freezed: 3.2.3
  patrol: 4.5.0
  shared_preferences_platform_interface:


dependency_overrides:
  intl: 0.20.2

flutter:
  uses-material-design: true
  generate: true
  assets:
    - shorebird.yaml
    - assets/test_data/

cider:
  link_template:
    tag: https://github.com/RemeJuan/threed_print_cost_calculator/releases/tag/%tag% # initial release link template
    diff: https://github.com/RemeJuan/threed_print_cost_calculator/compare/%from%...%to% # subsequent releases link template

patrol:
  app_name: 3D Print Cost Calculator
  android:
    package_name: com.threed_print_calculator
  ios:
    bundle_id: com.threed-print-calculator
